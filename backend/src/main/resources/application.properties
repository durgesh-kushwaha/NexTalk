
server.port=${PORT:8080}
server.servlet.context-path=/

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/nextalk_db}
spring.data.mongodb.auto-index-creation=true

spring.main.allow-bean-definition-overriding=true

nextalk.jwt.secret=${NEXTALK_JWT_SECRET:bmV4dGFsay1zZWNyZXQta2V5LWZvci1qd3QtYXV0aC0yMDI0LWxvbmctZW5vdWdo}
nextalk.jwt.expiration=${NEXTALK_JWT_EXPIRATION:86400000}

nextalk.cors.allowed-origins=*
nextalk.media.root=${user.dir}/public
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

logging.level.com.nextalk=DEBUG
logging.level.org.springframework.web.socket=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=WARN
