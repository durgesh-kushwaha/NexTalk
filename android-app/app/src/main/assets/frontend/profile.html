<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexTalk Profile</title>
  <link rel="stylesheet" href="css/profile.css" />
</head>
<body>
  <div class="profile-shell">
    <header class="topbar">
      <h1>Profile</h1>
      <div class="top-actions">
        <button id="theme-toggle-btn">Theme</button>
        <button id="back-btn">Back to Chat</button>
      </div>
    </header>

    <section class="card">
      <div class="avatar-preview-wrap">
        <img id="avatar-preview" alt="avatar" />
      </div>
      <form id="profile-form">
        <label>
          <span>Display Name</span>
          <input id="display-name" type="text" />
        </label>
        <label>
          <span>Profile Photo</span>
          <input id="avatar-file" type="file" accept="image/*" />
        </label>
        <label>
          <span>Bio</span>
          <textarea id="bio" rows="4" maxlength="200" placeholder="Write your bio"></textarea>
        </label>
        <button type="submit" id="save-btn">Save Profile</button>
      </form>
      <div id="status-msg"></div>
    </section>
  </div>

  <script src="js/sw-cleanup.js"></script>
  <script src="js/api.js?v=20260313e"></script>
  <script src="js/profile.js"></script>
</body>
</html>
